<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <title>cat</title>

      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
    }
    .cat {
      width: 60px;
      height: 60px;
      background-image: url('sprite.png');
      background-size: 480.0px auto;
      background-repeat: no-repeat;
      background-position: 0px 0px;
      animation: cat-anim 6120ms steps(1) infinite;
      image-rendering: -webkit-optimize-contrast;
    }
    @keyframes cat-anim {
  0.000% { background-position: 0px 0px; }
