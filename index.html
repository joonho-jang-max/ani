<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cat</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; }
    .screen {
      position: relative;
      width: 402px;
      height: 874px;
      background-image: url('bg.png');
      background-size: 100% auto;
      background-repeat: no-repeat;
      overflow: hidden;
    }
    .float-widget {
      position: absolute;
      bottom: 100px;
      right: 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    /* 말풍선 영역 */
    .bubble-wrap {
      position: relative;
      margin-bottom: 6px;
    }
    .pill {
      position: relative;
      background: #111;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
      height: 28px;
      border-radius: 20px;
      overflow: hidden;
      white-space: nowrap;
      padding: 0 12px;
      line-height: 28px;
      box-sizing: border-box;
      width: max-content;
      transition: none;
    }
    .pill.ready { transition: width 0.45s ease-in-out; }
    .pill.shrunk { width: 74px; }
    .pill-text-full {
      position: absolute;
      top: 0; left: 12px;
      line-height: 28px;
      white-space: nowrap;
      opacity: 1;
      transition: opacity 0.25s ease-in-out;
    }
    .pill.shrunk .pill-text-full { opacity: 0; }
    .pill-text-short {
      position: absolute;
      top: 1px; left: 0; right: 0;
      line-height: 26px;
      padding-bottom: 2px;
      white-space: nowrap;
      text-align: center;
      opacity: 0;
      transition: none;
    }
    .pill.shrunk .pill-text-short {
      opacity: 1;
      transition: opacity 0.25s ease-in-out 0.5s;
    }
    .pill-spacer { visibility: hidden; pointer-events: none; }

    /* 레드닷 */
    .reddot {
      position: absolute;
      top: 1.5px; right: 1.5px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #FF2F5D;
      box-shadow: 0 0 0 1.5px #fff;
      pointer-events: none;
    }
    /* 꼬리 */
    .tail {
      position: absolute;
      bottom: -5px; right: 28px;
      width: 10px; height: 7px;
      overflow: hidden;
    }
    .tail svg {
      position: absolute;
      top: -7px; left: 0;
      display: block;
    }

    .cat-wrapper {
      position: relative;
      width: 60px;
      height: 60px;
    }
    .cat-bg {
      position: absolute;
      inset: 0;
      border-radius: 26px;
      background: linear-gradient(to bottom, #00dc64, #fff);
    }
    .cat {
      position: absolute;
      inset: 0;
      background-image: url('sprite.png');
      background-size: 480px auto;
      background-repeat: no-repeat;
      animation: cat-anim 5880ms steps(1) infinite;
    }
    @keyframes cat-anim {
  0.000% { background-position: 0px 0px; }
  25.510% { background-position: 0px 0px; }
  25.510% { background-position: -60px 0px; }
  26.531% { background-position: -60px 0px; }
  26.531% { background-position: -120px 0px; }
  27.551% { background-position: -120px 0px; }
  27.551% { background-position: -180px 0px; }
  28.571% { background-position: -180px 0px; }
  28.571% { background-position: -240px 0px; }
  29.592% { background-position: -240px 0px; }
  29.592% { background-position: -300px 0px; }
  30.612% { background-position: -300px 0px; }
  30.612% { background-position: -360px 0px; }
  31.633% { background-position: -360px 0px; }
  31.633% { background-position: -420px 0px; }
  32.653% { background-position: -420px 0px; }
  32.653% { background-position: 0px -60px; }
  33.673% { background-position: 0px -60px; }
  33.673% { background-position: -60px -60px; }
  34.694% { background-position: -60px -60px; }
  34.694% { background-position: -120px -60px; }
  35.714% { background-position: -120px -60px; }
  35.714% { background-position: -180px -60px; }
  36.735% { background-position: -180px -60px; }
  36.735% { background-position: -240px -60px; }
  87.755% { background-position: -240px -60px; }
  87.755% { background-position: -300px -60px; }
  88.776% { background-position: -300px -60px; }
  88.776% { background-position: -360px -60px; }
  89.796% { background-position: -360px -60px; }
  89.796% { background-position: -420px -60px; }
  90.816% { background-position: -420px -60px; }
  90.816% { background-position: 0px -120px; }
  91.837% { background-position: 0px -120px; }
  91.837% { background-position: -60px -120px; }
  92.857% { background-position: -60px -120px; }
  92.857% { background-position: -120px -120px; }
  93.878% { background-position: -120px -120px; }
  93.878% { background-position: -180px -120px; }
  94.898% { background-position: -180px -120px; }
  94.898% { background-position: -240px -120px; }
  95.918% { background-position: -240px -120px; }
  95.918% { background-position: -300px -120px; }
  96.939% { background-position: -300px -120px; }
  96.939% { background-position: -360px -120px; }
  97.959% { background-position: -360px -120px; }
  97.959% { background-position: -420px -120px; }
  98.980% { background-position: -420px -120px; }
  98.980% { background-position: 0px -180px; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="float-widget">

      <div class="bubble-wrap">
        <div class="pill" id="pill">
          <span class="pill-text-full">오늘 쿠키미션 확인해보세요!</span>
          <span class="pill-text-short">리워드 미션</span>
          <span class="pill-spacer">오늘 쿠키미션 확인해보세요!</span>
        </div>

        <div class="tail">
          <svg width="10" height="14" viewBox="0 0 10 14">
            <path d="M5 1 Q5.8 0 10 7 Q5.8 14 5 13 Q4.2 14 0 7 Q4.2 0 5 1 Z" fill="#111"/>
          </svg>
        </div>
      </div>

      <div class="cat-wrapper">
        <div class="cat-bg"></div>
        <div class="cat"></div>
      </div>
    </div>
  </div>

  <script>
    const pill = document.getElementById('pill');
    const fullWidth = pill.offsetWidth;
    pill.style.width = fullWidth + 'px';
    requestAnimationFrame(() => requestAnimationFrame(() => pill.classList.add('ready')));

    const screen = document.querySelector('.screen');
    let shrunk = false;
    screen.addEventListener('scroll', () => {
      if (!shrunk && screen.scrollTop >= 10) {
        shrunk = true;
        pill.classList.add('shrunk');
      }
    }, { passive: true });
  </script>
</body>
</html>
