<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cat</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
    }
    .screen {
      position: relative;
      width: 402px;
      height: 874px;
      background-image: url('bg.png');
      background-size: 100% auto;
      background-repeat: no-repeat;
      overflow: hidden;
    }
    .cat-wrapper {
      position: absolute;
      bottom: 100px;
      right: 16px;
      width: 60px;
      height: 60px;
    }
    .cat-bg {
      position: absolute;
      inset: 0;
      border-radius: 26px;
      background: linear-gradient(to bottom, #00dc64, #fff);
    }
    .cat {
      position: absolute;
      inset: 0;
      width: 60px;
      height: 60px;
      background-image: url('sprite.png');
      background-size: 480px auto;
      background-repeat: no-repeat;
      background-position: 0px 0px;
      animation: cat-anim 6120ms steps(1) infinite;
    }
    @keyframes cat-anim {
  0.000% { background-position: 0px 0px; }
  24.510% { background-position: 0px 0px; }
  24.510% { background-position: -60px 0px; }
  25.490% { background-position: -60px 0px; }
  25.490% { background-position: -120px 0px; }
  26.471% { background-position: -120px 0px; }
  26.471% { background-position: -180px 0px; }
  27.451% { background-position: -180px 0px; }
  27.451% { background-position: -240px 0px; }
  28.431% { background-position: -240px 0px; }
  28.431% { background-position: -300px 0px; }
  29.412% { background-position: -300px 0px; }
  29.412% { background-position: -360px 0px; }
  30.392% { background-position: -360px 0px; }
  30.392% { background-position: -420px 0px; }
  31.373% { background-position: -420px 0px; }
  31.373% { background-position: 0px -60px; }
  32.353% { background-position: 0px -60px; }
  32.353% { background-position: -60px -60px; }
  33.333% { background-position: -60px -60px; }
  33.333% { background-position: -120px -60px; }
  34.314% { background-position: -120px -60px; }
  34.314% { background-position: -180px -60px; }
  35.294% { background-position: -180px -60px; }
  35.294% { background-position: -240px -60px; }
  36.275% { background-position: -240px -60px; }
  36.275% { background-position: -300px -60px; }
  37.255% { background-position: -300px -60px; }
  37.255% { background-position: -360px -60px; }
  38.235% { background-position: -360px -60px; }
  38.235% { background-position: -420px -60px; }
  39.216% { background-position: -420px -60px; }
  39.216% { background-position: 0px -120px; }
  88.235% { background-position: 0px -120px; }
  88.235% { background-position: -60px -120px; }
  89.216% { background-position: -60px -120px; }
  89.216% { background-position: -120px -120px; }
  90.196% { background-position: -120px -120px; }
  90.196% { background-position: -180px -120px; }
  91.176% { background-position: -180px -120px; }
  91.176% { background-position: -240px -120px; }
  92.157% { background-position: -240px -120px; }
  92.157% { background-position: -300px -120px; }
  93.137% { background-position: -300px -120px; }
  93.137% { background-position: -360px -120px; }
  94.118% { background-position: -360px -120px; }
  94.118% { background-position: -420px -120px; }
  95.098% { background-position: -420px -120px; }
  95.098% { background-position: 0px -180px; }
  96.078% { background-position: 0px -180px; }
  96.078% { background-position: -60px -180px; }
  97.059% { background-position: -60px -180px; }
  97.059% { background-position: -120px -180px; }
  98.039% { background-position: -120px -180px; }
  98.039% { background-position: -180px -180px; }
  99.020% { background-position: -180px -180px; }
  99.020% { background-position: -240px -180px; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="cat-wrapper">
      <div class="cat-bg"></div>
      <div class="cat"></div>
    </div>
  </div>
</body>
</html>
